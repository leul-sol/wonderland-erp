services:
  wh-gateway:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      s1-identity:
        condition: service_healthy
      s4-finance-bi:
        condition: service_healthy
      s3-hospitality:
        condition: service_healthy
      s2-workforce:
        condition: service_healthy
      web-portal:
        condition: service_healthy
    networks:
      - wh-internal

  s1-identity:
    build:
      context: ./s1-identity-access
      dockerfile: Dockerfile
    environment:
      APP_NAME: WH-S1-Identity-Access
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://s1-identity:9001
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s1_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      REDIS_BUS_HOST: wh-redis-bus
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S2_SERVICE_URL: http://s2-workforce:9002
      SUPER_ADMIN_PASSWORD: ${SUPER_ADMIN_PASSWORD:-ChangeMeNow!10}
    volumes:
      - ./s1-identity-access:/var/www/html
      - ./specs:/var/www/html/specs:ro
    networks:
      - wh-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  wh-mysql:
    build:
      context: .
      dockerfile: docker/mysql/Dockerfile
    image: wonderland-erp-wh-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root_secret}
      MYSQL_DATABASE: wh_s1_db
      WH_DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
    volumes:
      - wh-mysql-data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    networks:
      - wh-internal
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${MYSQL_ROOT_PASSWORD:-root_secret}"]
      interval: 10s
      timeout: 5s
      retries: 10

  wh-redis:
    image: redis:7-alpine
    networks:
      - wh-internal

  wh-redis-bus:
    image: redis:7-alpine
    networks:
      - wh-internal

  s1-workers:
    build:
      context: ./s1-identity-access
      dockerfile: Dockerfile
    entrypoint: []
    command: >
      sh -c "while true; do php artisan events:consume-s2; echo 'S2 consumer exited, restarting...'; sleep 2; done &
      while true; do php artisan outbox:publish; sleep 10; done"
    environment:
      APP_NAME: WH-S1-Identity-Access
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s1_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      REDIS_BUS_HOST: wh-redis-bus
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S2_SERVICE_URL: http://s2-workforce:9002
    volumes:
      - ./s1-identity-access:/var/www/html
      - ./specs:/var/www/html/specs:ro
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis-bus:
        condition: service_started
      s1-identity:
        condition: service_healthy
    networks:
      - wh-internal

  s4-finance-bi:
    build:
      context: ./s4-finance-bi
      dockerfile: Dockerfile
    environment:
      APP_NAME: WH-S4-Finance-BI
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://s4-finance-bi:9004
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s4_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      REDIS_BUS_HOST: wh-redis-bus
      REDIS_BUS_PORT: 6379
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S1_SERVICE_URL: http://s1-identity:9001
      S2_SERVICE_URL: http://s2-workforce:9002
      S3_SERVICE_URL: http://s3-hospitality:9003
      WONDERLAND_REPO_ROOT: /opt/wonderland-erp
    volumes:
      - ./s4-finance-bi:/var/www/html
      - .:/opt/wonderland-erp:ro
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis:
        condition: service_started
      s1-identity:
        condition: service_healthy
    networks:
      - wh-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9004/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  s4-workers:
    build:
      context: ./s4-finance-bi
      dockerfile: Dockerfile
    entrypoint: []
    command: >
      sh -c "while true; do php artisan outbox:publish; sleep 10; done"
    environment:
      APP_NAME: WH-S4-Finance-BI
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s4_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      REDIS_BUS_HOST: wh-redis-bus
      REDIS_BUS_PORT: 6379
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S1_SERVICE_URL: http://s1-identity:9001
      S2_SERVICE_URL: http://s2-workforce:9002
      S3_SERVICE_URL: http://s3-hospitality:9003
      WONDERLAND_REPO_ROOT: /opt/wonderland-erp
    volumes:
      - ./s4-finance-bi:/var/www/html
      - .:/opt/wonderland-erp:ro
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis-bus:
        condition: service_started
      s4-finance-bi:
        condition: service_healthy
    networks:
      - wh-internal

  s3-hospitality:
    build:
      context: ./s3-hospitality-operations
      dockerfile: Dockerfile
    environment:
      APP_NAME: WH-S3-Hospitality
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://s3-hospitality:9003
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s3_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      REDIS_BUS_HOST: wh-redis-bus
      REDIS_BUS_PORT: 6379
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S1_SERVICE_URL: http://s1-identity:9001
      S2_SERVICE_URL: http://s2-workforce:9002
      S4_SERVICE_URL: http://s4-finance-bi:9004
      WONDERLAND_REPO_ROOT: /opt/wonderland-erp
    volumes:
      - ./s3-hospitality-operations:/var/www/html
      - .:/opt/wonderland-erp:ro
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis:
        condition: service_started
      wh-redis-bus:
        condition: service_started
      s1-identity:
        condition: service_healthy
      s4-finance-bi:
        condition: service_healthy
    networks:
      - wh-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9003/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  s3-workers:
    build:
      context: ./s3-hospitality-operations
      dockerfile: Dockerfile
    entrypoint: []
    command: >
      sh -c "while true; do php artisan outbox:publish; php artisan schedule:run; sleep 10; done"
    environment:
      APP_NAME: WH-S3-Hospitality
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s3_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_BUS_HOST: wh-redis-bus
      REDIS_BUS_PORT: 6379
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S1_SERVICE_URL: http://s1-identity:9001
      S4_SERVICE_URL: http://s4-finance-bi:9004
    volumes:
      - ./s3-hospitality-operations:/var/www/html
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis-bus:
        condition: service_started
      s3-hospitality:
        condition: service_healthy
    networks:
      - wh-internal

  s2-workforce:
    build:
      context: ./s2-workforce-payroll
      dockerfile: Dockerfile
    environment:
      APP_NAME: WH-S2-Workforce
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://s2-workforce:9002
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s2_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      REDIS_BUS_HOST: wh-redis-bus
      REDIS_BUS_PORT: 6379
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S1_SERVICE_URL: http://s1-identity:9001
      S4_SERVICE_URL: http://s4-finance-bi:9004
    volumes:
      - ./s2-workforce-payroll:/var/www/html
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis:
        condition: service_started
      wh-redis-bus:
        condition: service_started
      s1-identity:
        condition: service_healthy
      s4-finance-bi:
        condition: service_healthy
    networks:
      - wh-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9002/api/v1/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 120s

  s2-workers:
    build:
      context: ./s2-workforce-payroll
      dockerfile: Dockerfile
    entrypoint: []
    command: >
      sh -c "while true; do php artisan outbox:publish; sleep 10; done"
    environment:
      APP_NAME: WH-S2-Workforce
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: wh-mysql
      DB_PORT: 3306
      DB_DATABASE: wh_s2_db
      DB_USERNAME: wh_app
      DB_PASSWORD: ${DB_PASSWORD:-wh_app_secret}
      REDIS_BUS_HOST: wh-redis-bus
      REDIS_BUS_PORT: 6379
      INTERNAL_KEY_CURRENT: ${INTERNAL_KEY_CURRENT:-dev-internal-key-change-in-prod}
      S1_SERVICE_URL: http://s1-identity:9001
      S4_SERVICE_URL: http://s4-finance-bi:9004
    volumes:
      - ./s2-workforce-payroll:/var/www/html
    depends_on:
      wh-mysql:
        condition: service_healthy
      wh-redis-bus:
        condition: service_started
      s2-workforce:
        condition: service_healthy
    networks:
      - wh-internal

  web-portal:
    build:
      context: ./web-portal
      dockerfile: Dockerfile
    environment:
      APP_NAME: "Wonderland ERP Portal"
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost
      DB_CONNECTION: sqlite
      SESSION_DRIVER: redis
      SESSION_ENCRYPT: "true"
      CACHE_STORE: redis
      REDIS_HOST: wh-redis
      REDIS_PORT: 6379
      GATEWAY_INTERNAL_URL: http://wh-gateway
    volumes:
      - ./web-portal:/var/www/html
    depends_on:
      wh-redis:
        condition: service_started
      s1-identity:
        condition: service_healthy
    networks:
      - wh-internal
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/up"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s

networks:
  wh-internal:
    driver: bridge

volumes:
  wh-mysql-data:
