worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $binary_remote_addr zone=s1_login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=s1_refresh:10m rate=30r/m;

    map $http_authorization $jwt_sub {
        default "";
        "~*Bearer\s+([^\s]+)" $1;
    }

    map $host $forwarded_proto {
        default https;
    }

    server {
        listen 80;
        server_name localhost;

        location = /health {
            return 200 "gateway ok\n";
            add_header Content-Type text/plain;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    server {
        listen 443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers off;

        include /etc/nginx/includes/upstream-locations.conf;
    }
}
