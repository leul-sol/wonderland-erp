location = /s1/api/v1/auth/login {
    set $s1_backend "s1-identity:9001";
    rewrite ^/s1/(.*)$ /$1 break;
    limit_req zone=s1_login burst=5 nodelay;
    proxy_pass http://$s1_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Request-Id $request_id;
}

location = /s1/api/v1/auth/refresh {
    set $s1_backend "s1-identity:9001";
    rewrite ^/s1/(.*)$ /$1 break;
    limit_req zone=s1_refresh burst=10 nodelay;
    proxy_pass http://$s1_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Request-Id $request_id;
}

location /s1/ {
    set $s1_backend "s1-identity:9001";
    rewrite ^/s1/(.*)$ /$1 break;
    proxy_pass http://$s1_backend;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-Proto $forwarded_proto;
    proxy_set_header X-Request-Id $request_id;
    proxy_intercept_errors on;
    error_page 502 503 504 =503 @s1_unavailable;
}

location @s1_unavailable {
    default_type application/json;
    return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"S1 Identity service is unavailable.","details":{}}}';
}

