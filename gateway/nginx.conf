worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    # Docker embedded DNS — re-resolve upstream hostnames when containers restart.
    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $binary_remote_addr zone=s1_login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=s1_refresh:10m rate=30r/m;

    map $http_authorization $jwt_sub {
        default "";
        "~*Bearer\s+([^\s]+)" $1;
    }

    server {
        listen 80;
        server_name localhost;

        location = /s1/api/v1/auth/login {
            set $s1_backend "s1-identity:9001";
            rewrite ^/s1/(.*)$ /$1 break;
            limit_req zone=s1_login burst=5 nodelay;
            proxy_pass http://$s1_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location = /s1/api/v1/auth/refresh {
            set $s1_backend "s1-identity:9001";
            rewrite ^/s1/(.*)$ /$1 break;
            limit_req zone=s1_refresh burst=10 nodelay;
            proxy_pass http://$s1_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location /s1/ {
            set $s1_backend "s1-identity:9001";
            rewrite ^/s1/(.*)$ /$1 break;
            proxy_pass http://$s1_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =503 @s1_unavailable;
        }

        location @s1_unavailable {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"S1 Identity service is unavailable.","details":{}}}';
        }

        location /s4/ {
            set $s4_backend "s4-finance-bi:9004";
            rewrite ^/s4/(.*)$ /$1 break;
            proxy_pass http://$s4_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =503 @s4_unavailable;
        }

        location @s4_unavailable {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"S4 Finance service is unavailable.","details":{}}}';
        }

        location /s3/ {
            set $s3_backend "s3-hospitality:9003";
            rewrite ^/s3/(.*)$ /$1 break;
            proxy_pass http://$s3_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =503 @s3_unavailable;
        }

        location @s3_unavailable {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"S3 Hospitality service is unavailable.","details":{}}}';
        }

        location /s2/ {
            set $s2_backend "s2-workforce:9002";
            rewrite ^/s2/(.*)$ /$1 break;
            proxy_pass http://$s2_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =503 @s2_unavailable;
        }

        location @s2_unavailable {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"S2 Workforce service is unavailable.","details":{}}}';
        }

        location = /health {
            return 200 "gateway ok\n";
            add_header Content-Type text/plain;
        }
    }
}
