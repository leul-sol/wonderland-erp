worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;
    proxy_connect_timeout 300s;
    proxy_send_timeout 300s;
    proxy_read_timeout 300s;

    resolver 127.0.0.11 valid=10s ipv6=off;

    limit_req_zone $binary_remote_addr zone=s1_login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=s1_refresh:10m rate=30r/m;

    map $http_authorization $jwt_sub {
        default "";
        "~*Bearer\s+([^\s]+)" $1;
    }

    # Preserve X-Forwarded-Proto from cloudflared / reverse proxies (HTTPS tunnel → local HTTP).
    map $http_x_forwarded_proto $forwarded_proto {
        default $http_x_forwarded_proto;
        ""      $scheme;
    }

    server {
        listen 80;
        server_name localhost;

        include /etc/nginx/includes/upstream-locations.conf;
    }
}
