worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    sendfile on;
    keepalive_timeout 65;

    limit_req_zone $binary_remote_addr zone=s1_login:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=s1_refresh:10m rate=30r/m;

    map $http_authorization $jwt_sub {
        default "";
        "~*Bearer\s+([^\s]+)" $1;
    }

    upstream s1_identity {
        server s1-identity:9001;
    }

    server {
        listen 80;
        server_name localhost;

        location = /s1/api/v1/auth/login {
            rewrite ^/s1/(.*)$ /$1 break;
            limit_req zone=s1_login burst=5 nodelay;
            proxy_pass http://s1_identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location = /s1/api/v1/auth/refresh {
            rewrite ^/s1/(.*)$ /$1 break;
            limit_req zone=s1_refresh burst=10 nodelay;
            proxy_pass http://s1_identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
        }

        location /s1/ {
            rewrite ^/s1/(.*)$ /$1 break;
            proxy_pass http://s1_identity;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Request-Id $request_id;
            proxy_intercept_errors on;
            error_page 502 503 504 =503 @s1_unavailable;
        }

        location @s1_unavailable {
            default_type application/json;
            return 503 '{"error":{"code":"SERVICE_UNAVAILABLE","message":"S1 Identity service is unavailable.","details":{}}}';
        }

        location = /health {
            return 200 "gateway ok\n";
            add_header Content-Type text/plain;
        }
    }
}
