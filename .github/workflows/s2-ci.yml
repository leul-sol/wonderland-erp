name: S2 CI

on:
  push:
    paths:
      - 's2-workforce-payroll/**'
      - 'specs/s2/**'
      - '.github/workflows/s2-ci.yml'
  pull_request:
    paths:
      - 's2-workforce-payroll/**'
      - 'specs/s2/**'
      - '.github/workflows/s2-ci.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: s2-workforce-payroll

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, pdo_sqlite, bcmath
          coverage: none

      - name: Install dependencies
        run: composer install --prefer-dist --no-interaction

      - name: Run tests
        run: vendor/bin/phpunit
